<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión – Hogar Ideal Perú</title>
  <meta name="description" content="Acceso al Panel Administrativo">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* TOKENS - Fixed Dark Theme */
    :root {
      --yellow:     #FACC15;
      --yellow-h:   #FDE047;
      
      --bg:         #111111;       /* Fondo totalmente negro */
      --card-bg:    #1A1A1A;       /* Negro ligero para la tarjeta */
      
      --text:       #FFFFFF;       /* Texto principal blanco */
      --text-muted: #888888;       /* Texto secundario gris */
      
      --border:     #383838;       /* Bordes sutiles oscuros */
      --input-bg:   #242424;       /* Fondo de los inputs */
      --input-foc:  #555555;       /* Hover/Focus de los inputs */
      
      --red:        #ef4444;
      --red-bg:     rgba(239,68,68,.12);
      --green:      #22c55e;
      --green-bg:   rgba(34,197,94,.12);
      
      --radius-sm:  8px;
      --radius:     16px;
      --shadow:     0 8px 30px rgba(0,0,0,0.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { 
      height: 100%; 
      font-family: 'Inter', sans-serif; 
      background: var(--bg); 
      color: var(--text); 
    }
    a { text-decoration: none; }
    button { cursor: pointer; font-family: inherit; }

    .login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .login-card {
      width: 100%; max-width: 420px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 2.5rem;
      box-shadow: var(--shadow);
    }

    .form-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .form-header h2 {
      font-size: 1.8rem; font-weight: 800;
      color: var(--text); letter-spacing: -.02em;
      margin-bottom: .4rem;
    }
    .form-header p {
      font-size: .9rem; color: var(--text-muted);
    }

    /* FORM ELEMENTS */
    .form-group { margin-bottom: 1.25rem; }
    label {
      display: block; font-size: .85rem;
      font-weight: 700; color: var(--text);
      margin-bottom: .5rem;
    }
    
    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: .85rem 1rem;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: .95rem; font-family: 'Inter', sans-serif;
      color: var(--text); outline: none;
      transition: border-color .2s;
    }
    input::placeholder { color: var(--text-muted); }
    input:focus  { border-color: var(--yellow); box-shadow: 0 0 0 2px rgba(250,204,21,.15); }
    
    .form-row {
      display: flex; align-items: center;
      justify-content: flex-end; margin-bottom: 1.5rem; margin-top: .5rem;
    }
    .forgot-link { font-size: .85rem; color: var(--yellow); font-weight: 600; transition: opacity .2s; }
    .forgot-link:hover { opacity: .75; }

    /* SUBMIT BUTTON */
    .btn-submit {
      width: 100%; padding: 1rem;
      background: var(--yellow); color: #111111;
      border: none; border-radius: var(--radius-sm);
      font-size: 1rem; font-weight: 800;
      letter-spacing: .02em;
      transition: background .2s, transform .2s;
    }
    .btn-submit:hover { 
      background: var(--yellow-h); 
      transform: translateY(-1px);
    }

    /* ALERTS */
    .alert {
      padding: .8rem 1rem; border-radius: var(--radius-sm);
      font-size: .85rem; font-weight: 500; margin-bottom: 1.25rem;
      text-align: center;
    }
    .alert-error   { background: var(--red-bg);   color: #f87171; border: 1px solid rgba(239,68,68,.2); }
    .alert-success { background: var(--green-bg); color: #4ade80; border: 1px solid rgba(34,197,94,.2); }
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="form-header">
      <h2>Bienvenido</h2>
      <p>Ingresa tus credenciales</p>
    </div>

    <div class="alert alert-error" id="error-alert" style="display:none">Credenciales incorrectas.</div>
    <div class="alert alert-success" id="ok-alert" style="display:none">✅ Ingresando al sistema...</div>

    <form id="form" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="nombre@correo.com" value="admin@hogarideal.pe">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" value="admin123">
      </div>

      <div class="form-row">
        <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit" class="btn-submit" id="btn-submit">
        INICIAR SESIÓN
      </button>
    </form>
  </div>
</div>

<script>
  const VALID_EMAIL = 'admin@hogarideal.pe', VALID_PASS = 'admin123';
  document.getElementById('form').addEventListener('submit', e => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value;
    document.getElementById('error-alert').style.display = 'none';
    
    if (!email || !pass) return;

    if (email===VALID_EMAIL && pass===VALID_PASS) {
      document.getElementById('ok-alert').style.display = 'block';
      setTimeout(() => alert('✅ Redirigiendo a: dashboard-preview.html'), 800);
    } else {
      document.getElementById('error-alert').style.display = 'block';
    }
  });
</script>
</body>
</html>
